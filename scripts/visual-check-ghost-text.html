<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; background: #020617; }
      #term-wrap { position: relative; width: 640px; height: 200px; padding: 8px; box-sizing: border-box; }
      #term { position: absolute; inset: 8px; }
      #ghost {
        position: absolute;
        pointer-events: none;
        user-select: none;
        white-space: pre;
        color: rgba(148, 163, 184, 0.9);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="term-wrap">
      <div id="term"></div>
      <span id="ghost"></span>
    </div>
    <script type="module" src="./visual-check-ghost-text.client.mjs"></script>
  </body>
</html>
